const COUNTRY_COORDS = {
  "South Africa":{lat:-29,lon:25},"Zimbabwe":{lat:-20,lon:30},"Nigeria":{lat:9,lon:8},
  "Egypt":{lat:27,lon:30},"Kenya":{lat:-1,lon:37},"Sudan":{lat:15,lon:30},
  "Senegal":{lat:14,lon:-14},"Tunisia":{lat:34,lon:9},"Morocco":{lat:32,lon:-6},
  "Ghana":{lat:8,lon:-1},"Burkina Faso":{lat:12,lon:-2},"Mali":{lat:17,lon:-4},
  "Niger":{lat:17,lon:8},"Ethiopia":{lat:9,lon:40},"Cameroon":{lat:4,lon:12},
  "Democratic Republic of Congo":{lat:-4,lon:24},"Uganda":{lat:1,lon:32},
  "Angola":{lat:-12,lon:17},"Zambia":{lat:-14,lon:28},"Mozambique":{lat:-18,lon:35},
  "Namibia":{lat:-22,lon:17},"Botswana":{lat:-22,lon:24},
  "Chad":{lat:15,lon:19},"Libya":{lat:27,lon:17},"Madagascar":{lat:-20,lon:47},
  "Malawi":{lat:-13,lon:34},"Sierra Leone":{lat:8,lon:-12},"Liberia":{lat:6,lon:-9},
  "Guinea":{lat:11,lon:-11},"Lesotho":{lat:-29.5,lon:28.5},"Eswatini":{lat:-26.5,lon:31.5},
  "South Sudan":{lat:7,lon:30},"Rwanda":{lat:-2,lon:30},"Congo":{lat:-1,lon:15},
  "Central African Republic":{lat:7,lon:21},
};

const THEME_COLORS = {
  "Political":"#3266ad","Economic":"#d85a30","Human Rights":"#7f77dd",
  "Governance":"#0f6e56","Labour":"#ba7517","Gender":"#d4537e",
  "Social Justice":"#1d9e75","Education":"#639922","Xenophobia":"#993556",
  "Environment":"#188038","Service Delivery":"#5f5e5a","Health":"#185fa5",
  "Security":"#a32d2d","Peace":"#3b6d11",
};

const REGION_MAP = {
  "South Africa":"Southern Africa","Zimbabwe":"Southern Africa","Zambia":"Southern Africa",
  "Mozambique":"Southern Africa","Namibia":"Southern Africa","Botswana":"Southern Africa",
  "Lesotho":"Southern Africa","Eswatini":"Southern Africa","Malawi":"Southern Africa",
  "Angola":"Southern Africa","Nigeria":"West Africa","Senegal":"West Africa",
  "Ghana":"West Africa","Mali":"West Africa","Burkina Faso":"West Africa",
  "Niger":"West Africa","Sierra Leone":"West Africa","Liberia":"West Africa",
  "Guinea":"West Africa","Congo":"Central Africa","Egypt":"North Africa",
  "Tunisia":"North Africa","Morocco":"North Africa","Libya":"North Africa",
  "Sudan":"East Africa","Ethiopia":"East Africa","Kenya":"East Africa",
  "Uganda":"East Africa","Rwanda":"East Africa","South Sudan":"East Africa",
  "Madagascar":"East Africa","Cameroon":"Central Africa",
  "Democratic Republic of Congo":"Central Africa","Central African Republic":"Central Africa",
  "Chad":"Central Africa",
};

const W = 680, H = 780;
let yearMin = 2008, yearMax = 2024;
let worldTopo = null, activeChart = null, activeChart2 = null;

function getProjection() {
  return d3.geoMercator().center([22,-2]).scale(600).translate([W/2-20,H/2+10]);
}
function filteredEvents() { return EVENTS.filter(e=>e.year>=yearMin&&e.year<=yearMax); }

function updateMetrics() {
  const evs = filteredEvents();
  const countries = new Set(evs.map(e=>e.country)).size;
  const themes = {}; evs.forEach(e=>{themes[e.theme]=(themes[e.theme]||0)+1;});
  const topTheme = Object.entries(themes).sort((a,b)=>b[1]-a[1])[0]?.[0]||"—";
  document.getElementById("metrics-row").innerHTML = `
    <div class="metric"><div class="metric-label">Total movements</div><div class="metric-value" style="color:#3266ad">${evs.length}</div></div>
    <div class="metric"><div class="metric-label">Countries</div><div class="metric-value" style="color:#d85a30">${countries}</div></div>
    <div class="metric"><div class="metric-label">Years shown</div><div class="metric-value">${yearMin}–${yearMax}</div></div>
    <div class="metric"><div class="metric-label">Top theme</div><div class="metric-value" style="font-size:13px;color:#7f77dd">${topTheme}</div></div>
  `;
}

function pickFeaturedEvent(country, evs) {
  const withImg = evs.filter(e=>e.country===country&&e.media&&e.media.startsWith("http")&&!e.media.includes("youtube")&&!e.media.includes("youtu.be"));
  return withImg[0] || evs.find(e=>e.country===country) || null;
}

function updateBubbles() {
  const evs = filteredEvents();
  const counts = {}; evs.forEach(e=>{counts[e.country]=(counts[e.country]||0)+1;});
  const maxCount = Math.max(...Object.values(counts),1);
  const top3 = new Set(Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,3).map(d=>d[0]));
  const projection = getProjection();
  const isDark = matchMedia("(prefers-color-scheme: dark)").matches;
  const tooltip = document.getElementById("rich-tooltip");

  d3.select("#map-container svg").selectAll(".bubble-g").remove();
  const svg = d3.select("#map-container svg");

  Object.entries(COUNTRY_COORDS).forEach(([cName,coords])=>{
    const count = counts[cName]||0; if(!count) return;
    const proj = projection([coords.lon,coords.lat]); if(!proj) return;
    const [x,y]=proj; if(x<0||x>W||y<0||y>H) return;
    const r = 12+(count/maxCount)*32;
    const ct={}; evs.filter(e=>e.country===cName).forEach(e=>{ct[e.theme]=(ct[e.theme]||0)+1;});
    const topT=Object.entries(ct).sort((a,b)=>b[1]-a[1])[0]?.[0]||"Political";
    const col=THEME_COLORS[topT]||"#3266ad";
    const isTop3=top3.has(cName);
    const g=svg.append("g").attr("class","bubble-g").style("cursor","pointer");
    if(isTop3){g.append("circle").attr("cx",x).attr("cy",y).attr("r",r+4).attr("fill","none").attr("stroke",col).attr("stroke-width",1.5).attr("stroke-dasharray","3 3").attr("opacity",0.6);}
    g.append("circle").attr("cx",x).attr("cy",y).attr("r",r).attr("fill",col).attr("fill-opacity",0.82).attr("stroke","#fff").attr("stroke-width",1.5);
    g.append("text").attr("x",x).attr("y",y+4).attr("text-anchor","middle").attr("font-size",Math.max(9,Math.min(13,r-2))).attr("font-weight","500").attr("fill","#fff").text(count);
    g.on("click",()=>renderCountry(cName));
    g.on("mouseenter",function(){
      d3.select(this).selectAll("circle").filter((_,i,nodes)=>nodes.length>1?i===nodes.length-2:true).attr("fill-opacity",1);
      if(isTop3){
        const svgEl=document.querySelector("#map-container svg");
        const svgRect=svgEl.getBoundingClientRect();
        const scaleX=svgRect.width/W, scaleY=svgRect.height/H;
        const outerRect=document.getElementById("map-outer").getBoundingClientRect();
        const svgOffX=svgRect.left-outerRect.left, svgOffY=svgRect.top-outerRect.top;
        const px=x*scaleX+svgOffX, py=y*scaleY+svgOffY;
        const tipW=260; const containerW=document.getElementById("map-outer").offsetWidth;
        let left=px+r*scaleX+10; let top=py-20;
        if(left+tipW>containerW) left=px-r*scaleX-tipW-10;
        if(top<0) top=0;
        tooltip.style.left=left+"px"; tooltip.style.top=top+"px";
        const featured=pickFeaturedEvent(cName,evs);
        document.getElementById("tip-country").textContent=`${cName} · ${count} movements`;
        document.getElementById("tip-headline").textContent=featured?featured.headline:"Various movements recorded";
        const imgWrap=document.getElementById("tip-img-wrap");
        imgWrap.innerHTML=""; imgWrap.style.background="";
        if(featured&&featured.media&&featured.media.startsWith("http")){
          const img=document.createElement("img"); img.src=featured.media; img.alt="";
          img.style.cssText="width:72px;height:54px;object-fit:cover;border-radius:8px;flex-shrink:0;";
          img.onerror=()=>{imgWrap.style.background=col+"22";imgWrap.innerHTML=`<span style="font-size:20px;">📍</span>`;};
          imgWrap.appendChild(img);
        } else { imgWrap.style.background=col+"22"; imgWrap.innerHTML=`<span style="font-size:20px;">📍</span>`; }
        tooltip.classList.add("visible");
      } else {
        const tip=svg.append("g").attr("id","simple-tooltip").attr("pointer-events","none");
        const tx=x>W-140?x-110:x+12; const ty=y<20?y+20:y-8;
        const lbl=`${cName}: ${count} movement${count>1?"s":""}`;
        tip.append("rect").attr("x",tx-5).attr("y",ty-14).attr("width",lbl.length*6.5+12).attr("height",22).attr("rx",4).attr("fill",isDark?"#333":"#fff").attr("stroke","#ccc").attr("stroke-width",0.5);
        tip.append("text").attr("x",tx+1).attr("y",ty+2).attr("font-size",11).attr("fill",isDark?"#fff":"#333").text(lbl);
      }
    });
    g.on("mouseleave",function(){
      d3.select(this).selectAll("circle").attr("fill-opacity",(d,i,nodes)=>nodes.length>1&&i===nodes.length-2?0.82:undefined).filter((_,i,nodes)=>i===nodes.length-2).attr("fill-opacity",0.82);
      tooltip.classList.remove("visible"); svg.select("#simple-tooltip").remove();
    });
  });
}

function initMap(){
  const isDark=matchMedia("(prefers-color-scheme: dark)").matches;
  document.getElementById("map-container").innerHTML="";
  const projection=getProjection(); const path=d3.geoPath(projection);
  const svg=d3.select("#map-container").append("svg").attr("viewBox",`0 0 ${W} ${H}`).attr("width","100%").style("background",isDark?"#1a1a1a":"#dbeef4");
  const AFRICA=new Set([12,24,204,72,86,854,108,120,132,140,148,174,180,231,232,262,266,288,324,404,426,430,434,454,466,478,504,516,562,566,646,686,694,706,710,716,728,732,740,788,800,818,834,894,178,638]);
  const allC=topojson.feature(worldTopo,worldTopo.objects.countries).features;
  svg.selectAll(".country").data(allC.filter(d=>AFRICA.has(+d.id))).join("path").attr("class","country").attr("d",path).attr("fill",isDark?"#2d3748":"#b8d4c0").attr("stroke",isDark?"#4a5568":"#fff").attr("stroke-width",0.5);
  updateBubbles();
}

function renderLegend(){
  document.getElementById("legend").innerHTML=Object.entries(THEME_COLORS).map(([t,c])=>`<span><span class="legend-dot" style="background:${c}"></span>${t}</span>`).join("");
}

function setupRangeSlider(){
  const minEl=document.getElementById("range-min"),maxEl=document.getElementById("range-max"),fill=document.getElementById("range-fill"),label=document.getElementById("year-label");
  function upd(){const mn=+minEl.value,mx=+maxEl.value;const pMn=(mn-2008)/16*100,pMx=(mx-2008)/16*100;fill.style.left=pMn+"%";fill.style.width=(pMx-pMn)+"%";label.textContent=mn+" – "+mx;}
  minEl.addEventListener("input",()=>{if(+minEl.value>+maxEl.value)minEl.value=maxEl.value;yearMin=+minEl.value;upd();updateMetrics();updateBubbles();});
  maxEl.addEventListener("input",()=>{if(+maxEl.value<+minEl.value)maxEl.value=minEl.value;yearMax=+maxEl.value;upd();updateMetrics();updateBubbles();});
  upd();
}

function renderCountry(country){
  document.getElementById("map-view").style.display="none";
  document.getElementById("country-view").style.display="block";
  document.getElementById("subtitle-text").textContent="← Back to explore another country";
  document.getElementById("rich-tooltip").classList.remove("visible");
  if(activeChart){activeChart.destroy();activeChart=null;}
  if(activeChart2){activeChart2.destroy();activeChart2=null;}
  const events=EVENTS.filter(e=>e.country===country).sort((a,b)=>a.year-b.year);
  const region=REGION_MAP[country]||"";
  const years=[...new Set(events.map(e=>e.year))].sort((a,b)=>a-b);
  const yc={};events.forEach(e=>{yc[e.year]=(yc[e.year]||0)+1;});
  const tc={};events.forEach(e=>{tc[e.theme]=(tc[e.theme]||0)+1;});
  const cv=document.getElementById("country-view");
  cv.innerHTML=`
    <div class="country-header">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="back-btn" id="back-btn"><i class="ti ti-arrow-left"></i> All countries</button>
        <div><h2 style="font-size:20px;font-weight:500;">${country}</h2>${region?`<span style="font-size:12px;color:#888;">${region}</span>`:""}</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <div class="metric" style="min-width:80px;"><div class="metric-label">Movements</div><div class="metric-value" style="color:#3266ad">${events.length}</div></div>
        <div class="metric" style="min-width:80px;"><div class="metric-label">First year</div><div class="metric-value">${years[0]}</div></div>
        <div class="metric" style="min-width:80px;"><div class="metric-label">Last year</div><div class="metric-value">${years[years.length-1]}</div></div>
      </div>
    </div>
    <div class="charts-row">
      <div><p class="chart-label">Movements per year</p><div class="chart-wrap"><canvas id="yearChart" role="img" aria-label="Movements per year in ${country}"></canvas></div></div>
      <div><p class="chart-label">By theme</p><div class="chart-wrap"><canvas id="themeChart" role="img" aria-label="Themes in ${country}"></canvas></div></div>
    </div>
    <p class="section-title">Timeline</p>
    <div class="timeline-wrap" id="timeline"></div>
  `;
  document.getElementById("back-btn").addEventListener("click",()=>{
    document.getElementById("country-view").style.display="none";
    document.getElementById("map-view").style.display="block";
    document.getElementById("subtitle-text").textContent="Click a country bubble to explore its protest history.";
  });
  const isDark=matchMedia("(prefers-color-scheme: dark)").matches;
  const tC=isDark?"#ccc":"#555",gC=isDark?"rgba(255,255,255,0.1)":"rgba(0,0,0,0.07)";
  const bC=years.map(y=>{const t={};events.filter(e=>e.year===y).forEach(e=>{t[e.theme]=(t[e.theme]||0)+1;});return THEME_COLORS[Object.entries(t).sort((a,b)=>b[1]-a[1])[0]?.[0]]||"#3266ad";});
  activeChart=new Chart(document.getElementById("yearChart"),{type:"bar",data:{labels:years,datasets:[{data:years.map(y=>yc[y]),backgroundColor:bC,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:tC,font:{size:10}},grid:{display:false}},y:{ticks:{color:tC,font:{size:10},stepSize:1},grid:{color:gC}}}}});
  const tK=Object.keys(tc);
  activeChart2=new Chart(document.getElementById("themeChart"),{type:"doughnut",data:{labels:tK,datasets:[{data:Object.values(tc),backgroundColor:tK.map(t=>THEME_COLORS[t]||"#888"),borderWidth:1,borderColor:isDark?"#222":"#fff"}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:"right",labels:{color:tC,font:{size:10},boxWidth:10,padding:6}}}}});
  const tl=document.getElementById("timeline");
  events.forEach(ev=>{
    const col=THEME_COLORS[ev.theme]||"#3266ad";
    const wrap=document.createElement("div"); wrap.className="tl-item";
    const hasImg=ev.media&&ev.media.startsWith("http")&&!ev.media.includes("youtube")&&!ev.media.includes("youtu.be");
    wrap.innerHTML=`
      <div class="tl-line"><div class="tl-dot" style="background:${col}"></div><div class="tl-connector"></div></div>
      <div class="event-card">
        <div class="event-inner">
          <div style="flex:1;min-width:0;">
            <div class="event-meta">
              <span class="event-year">${ev.year}</span>
              <span class="event-theme" style="background:${col}22;color:${col};">${ev.theme}</span>
            </div>
            <p class="event-headline">${ev.headline}</p>
            <p class="event-text">${ev.text}</p>
          </div>
          ${hasImg?`<img class="event-img" src="${ev.media}" alt="" onerror="this.style.display='none'">` : ""}
        </div>
      </div>`;
    tl.appendChild(wrap);
  });
}

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(world=>{
  worldTopo=world; updateMetrics(); initMap(); setupRangeSlider(); renderLegend();
});
</script>
